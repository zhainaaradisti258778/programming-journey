<!DOCTYPE html>
<html>
<head>
    <title>Tugas Z-Index</title>
    <style>
        body {
            background-color: #f5f5f5;
        }

        .container {
            position: relative;
            width: 400px;
            height: 300px;
        }

        img {
            width: 200px;
            position: absolute;
        }
        .gambar3 {
            top: 40px;
            left: 40px;
            z-index: 1;
        }
        .gambar2 {
            top: 20px;
            left: 20px;
            z-index: 2;
        }
        .gambar1 {
            top: 0;
            left: 0;
            z-index: 3;
        }
    </style>
</head>
<body>

    <h2>Tugas CSS Z-Index</h2>

</html>
