<!DOCTYPE html>
<html>
<head>
    <title>Inline Block</title>
    <style>
        .box {
            display: inline block;
            width: 120px;
            height: 100px;
            background-color: orange;
            margin: 5px;
            text-align: center;
            line-height: 100px;
        }

        .inline {
            display: inline;
            background-color: lightgreen;
            margin: 5px;
        }
    </style>
</head>
<body>
    
    <div class="box"> 1</div>
    <div class="box"> 2</div>
    <div class="box"> 3</div>

</body>
</html>
