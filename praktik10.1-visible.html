<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overflow Visisble</title>
    <style>
        div {
            background-color: coral;
            width: 200px;
            height: 65px;
            border: 1px solid;
            overflow: visible;
        } 
        
    </style>
</head>
<body>
    <h2>Overflow : Visible</h2>

    <p>By default, the overflow is visible,
        meaning that it is not clipped and it
        renders outside the elemen's box:</p>

    <div>You can use the overflow peoperty
        went you want to have better control of the layout.
        The overflow property specifies what happens
        if concent overflows an element's box.
    </div>    
</body>
</html>
