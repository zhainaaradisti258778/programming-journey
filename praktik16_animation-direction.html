<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<style>
div {
  width: 100px;
  height: 100px;
  background-color: red;
  position: relative;
  animation-name: myAnimation;
  animation-duration: 4s;
  animation-direction: reverse;
}

@keyframes myAnimation {
  0% {background-color: red; left:0px; top:0px;}
  25% {background-color: yellow; left:200px; top:0px;}
  50% {background-color: blue; left:200px; top:200px;}
  75% {background-color: green; left:0px; top:200px;}
  100% {background-color: red; left:0px; top:0px;}
}
</style>

</head>

<body>

<h1>CSS animation-direction Property</h1>
<div></div>

<p>Properti animation-direction menentukan apakah animasi harus diputar maju, mundur, atau dalam siklus bergantian. Contoh berikut akan menjalankan animasi dalam arah terbalik (mundur).</p>

</body>
</html>
