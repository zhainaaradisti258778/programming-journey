<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contoh nth-child</title>
    <style>
     tr:nth-child(odd) {
        background-color: #f0f0f0;
     }
    </style>
</head>
<body>
 <table border="1">
    <tr><td>Baris 1</td></tr>
    <tr><td>Baris 2</td></tr>
    <tr><td>Baris 3</td></tr>
 </table>
</body>
</html>
