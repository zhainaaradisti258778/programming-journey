<!DOCTYPE html>
<html>
<head>
    <title>Display None</title>
    <style>
        .hilang {
            display: none;
        }

        .inline {
            display: inline;
            background-color: lightgreen;
            margin: 5px;
        }
    </style>
</head>
<body>
    
    <p>Paragraf Pertama</p>
    <p class="hilang">Paragraf ini disembunyikan</p>
    <p>Paragraf ketiga</p>

</body>
</html>
