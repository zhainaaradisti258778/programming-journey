<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overflow Auto</title>
    <style>
        div {
            background-color: coral;
            width: 200px;
            height: 65px;
            border: 1px solid black;
            overflow: auto;
        } 
    </style>
</head>
<body>
    <h2>Overflow : auto</h2>
    <p>The aouto value is similiar to scroll, only it add scrollbars when necessary:</p>
    <div>You can use the overflow property when you want to have better
        contro; of the layout. The overflow property specifies what happens
        if concent overflow an element's box.
    </div>
</body>
</html>
